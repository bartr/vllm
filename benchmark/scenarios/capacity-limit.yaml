scenario: capacity-limit
description: "2-node fleet, 140 connections/node (280 total) vs max_concurrency=128 — forces queue wait"
duration: 3m
warmup: 15s
tags: [2-node, capacity, queue-wait]
baseline: baseline

# max_concurrency=128 means 140 concurrent/node will queue ~12 requests/node at steady state.
# All other settings at ConfigMap defaults.
nodes:
  cllm:
    max_tokens_in_flight: 200000
    max_waiting_requests: 32
    per_request_tokens_per_second: 32
    degradation_threshold: 10
    max_concurrency: 128
    max_degradation: 60
    prefill_rate_multiplier: 10
    prefill_base_overhead_ms: 30
    prefill_jitter_percent: 10
    prefill_max_ms: 800

groups:
  default:
    concurrency: 100
    ramp_to: 280
    ramp_duration: 30s
    prompts: scripts/prompts.yaml
    max_tokens: 100
