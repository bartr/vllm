scenario: 3-node-baseline
description: "3-node fleet (cllm + rtx + vllm), baseline traffic (180 connections = 60/node), prompts.yaml, max-tokens 100"
duration: 60s
warmup: 15s
tags: [3-node, baseline-traffic, rtx]
baseline: baseline

# Pin cllm to ConfigMap defaults for comparability.
# Source: kubectl get configmap cllm-nodes -n cllm
nodes:
  cllm:
    max_tokens_in_flight: 200000
    max_waiting_requests: 32
    per_request_tokens_per_second: 32
    degradation_threshold: 10
    max_concurrency: 128
    max_degradation: 60
    prefill_rate_multiplier: 10
    prefill_base_overhead_ms: 30
    prefill_jitter_percent: 10
    prefill_max_ms: 800

# rtx is created before the run and deleted after.
# Cloned from cllm ConfigMap defaults.
create_nodes:
  rtx:
    max_tokens_in_flight: 200000
    max_waiting_requests: 32
    per_request_tokens_per_second: 32
    degradation_threshold: 10
    max_concurrency: 128
    max_degradation: 60
    prefill_rate_multiplier: 10
    prefill_base_overhead_ms: 30
    prefill_jitter_percent: 10
    prefill_max_ms: 800

groups:
  default:
    concurrency: 180
    prompts: scripts/prompts.yaml
    max_tokens: 100
