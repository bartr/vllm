apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-observability-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  gpu-observability.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "avg by (namespace, pod) (DCGM_FI_DEV_GPU_UTIL{namespace=~\"llm|monitoring\"})",
              "legendFormat": "{{namespace}}/{{pod}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "GPU Utilization by Pod",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "avg by (namespace, pod) (DCGM_FI_DEV_FB_USED{namespace=~\"llm|monitoring\"})",
              "legendFormat": "{{namespace}}/{{pod}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "GPU Framebuffer Memory Used",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "watt"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "avg by (namespace, pod) (DCGM_FI_DEV_POWER_USAGE{namespace=~\"llm|monitoring\"})",
              "legendFormat": "{{namespace}}/{{pod}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "GPU Power Draw",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "avg by (namespace, pod) (DCGM_FI_DEV_GPU_TEMP{namespace=~\"llm|monitoring\"})",
              "legendFormat": "{{namespace}}/{{pod}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "GPU Temperature",
          "type": "timeseries"
        }
      ],
      "refresh": "15s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "gpu",
        "dcgm",
        "vllm"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "GPU Observability",
      "uid": "gpu-observability",
      "version": 1,
      "weekStart": ""
    }
---
