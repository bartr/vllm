apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: vllm-basic-auth
  namespace: llm
spec:
  basicAuth:
    realm: vLLM
    secret: vllm-basic-auth
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vllm-authenticated
  namespace: llm
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`vllm.local`)
      kind: Rule
      middlewares:
        - name: vllm-basic-auth
      services:
        - name: vllm
          port: 8000
