apiVersion: apps/v1
kind: Deployment
metadata:
  name: cllm
  namespace: cllm
  labels:
    app.kubernetes.io/name: cllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cllm
  template:
    metadata:
      labels:
        app: cllm
        app.kubernetes.io/name: cllm
    spec:
      securityContext:
        fsGroup: 65532
      enableServiceLinks: false
      containers:
        - name: cllm
          image: cllm:0.14.0
          imagePullPolicy: Never
          # Per-node pacing/concurrency now lives in cllm-nodes ConfigMap
          # (see nodes-configmap.yaml). The flags below only configure the
          # global queue admission ceilings (total tokens-in-flight and
          # waiting-request depth) used by the request scheduler.
          args:
            - --max-tokens-in-flight=6000
            - --max-waiting-requests=600
          env:
            - name: CACHE_DOWNSTREAM_URL
              value: http://vllm.vllm.svc.cluster.local:8000
            - name: CLLM_NODES_FILE
              value: /etc/cllm/nodes.yaml
            # Prefill simulation tuned to vLLM Qwen2.5-3B TTFT curve
            # (40ms @ c=1, ~500ms @ c=128). Per-class
            # prefill_rate_multiplier (in nodes-configmap classes block)
            # scales prefill with effective decode rate.
            - name: CACHE_PREFILL_BASE_OVERHEAD_MS
              value: "30"
            - name: CACHE_PREFILL_JITTER_PERCENT
              value: "10"
            - name: CACHE_PREFILL_MAX_MS
              value: "800"
          ports:
            - containerPort: 8080
              name: http
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: storage
              mountPath: /var/lib/cllm
            - name: nodes-config
              mountPath: /etc/cllm
              readOnly: true
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: cllm-storage
        - name: nodes-config
          configMap:
            name: cllm-nodes
