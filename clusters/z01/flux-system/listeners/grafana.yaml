apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana
  namespace: flux-system
spec:
  interval: 1m
  path: ./clusters/z01/grafana
  prune: true
  wait: true
  dependsOn:
    - name: prometheus
    - name: traefik
  sourceRef:
    kind: GitRepository
    name: flux-system
