apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prometheus
  namespace: flux-system
spec:
  interval: 1m
  path: ./clusters/z01/prometheus
  prune: true
  wait: true
  dependsOn:
    - name: prometheus-operator
  sourceRef:
    kind: GitRepository
    name: flux-system
