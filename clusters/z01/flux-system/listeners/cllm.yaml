apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cllm
  namespace: flux-system
spec:
  interval: 1m
  path: ./clusters/z01/cllm
  prune: true
  wait: true
  dependsOn:
    - name: nvidia-plugin
    - name: vllm
  sourceRef:
    kind: GitRepository
    name: flux-system
