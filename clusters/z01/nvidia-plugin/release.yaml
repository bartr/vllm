apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvdp
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: nvidia-device-plugin
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: true
  chart:
    spec:
      chart: nvidia-device-plugin
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: nvdp
        namespace: flux-system
      version: 0.19.0
  values:
    runtimeClassName: nvidia
    gfd:
      enabled: true
