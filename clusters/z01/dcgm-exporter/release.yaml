apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dcgm-exporter
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: monitoring
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: true
  chart:
    spec:
      chart: dcgm-exporter
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: dcgm-exporter
        namespace: flux-system
  values:
    runtimeClassName: nvidia
    kubernetes:
      enablePodLabels: true
    serviceMonitor:
      enabled: true
      interval: 15s
      additionalLabels:
        monitoring.coreos.com/instance: prometheus
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 512Mi
