apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - namespace.yaml
  - https://github.com/prometheus-operator/prometheus-operator/releases/download/v0.82.2/bundle.yaml
patches:
  - path: clusterrolebinding-patch.yaml
    target:
      kind: ClusterRoleBinding
      name: prometheus-operator
