apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - namespace.yaml
  - secret.yaml
  - pvc.yaml
  - datasources.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/name: grafana

configMapGenerator:
  - name: grafana-dashboard-importer
    files:
      - import-dashboards.sh=scripts/import-dashboards.sh
  - name: grafana-dashboard-sources
    files:
      - dashboards/cllm-overview.json
      - dashboards/gpu-overview.json
      - dashboards/vllm-overview.json
