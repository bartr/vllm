apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  labels:
    app.kubernetes.io/name: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: gpu
        orgId: 1
        folder: GPU
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/gpu
      - name: vllm
        orgId: 1
        folder: vLLM
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/vllm
