apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-dashboard-import
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-dashboard-import
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana-dashboard-import
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: clear-provisioning-state
          image: python:3.12-alpine
          command:
            - /bin/sh
            - -ec
            - |
              python3 - <<'PY'
              import sqlite3
              conn = sqlite3.connect('/var/lib/grafana/grafana.db')
              cur = conn.cursor()
              cur.execute('DELETE FROM dashboard_provisioning')
              deleted = cur.rowcount
              conn.commit()
              conn.close()
              print(f'cleared {deleted} dashboard_provisioning rows')
              PY
          volumeMounts:
            - name: storage
              mountPath: /var/lib/grafana
      containers:
        - name: importer
          image: python:3.12-alpine
          command:
            - /bin/sh
            - -ec
            - |
              apk add --no-cache curl >/dev/null
              for _ in $(seq 1 60); do
                if curl -fsS http://grafana.monitoring.svc.cluster.local:3000/api/health >/dev/null; then
                  break
                fi
                sleep 5
              done
              export GRAFANA_URL=http://grafana.monitoring.svc.cluster.local:3000
              export DASHBOARDS_ROOT=/opt/grafana-dashboards
              /opt/grafana-import/import-dashboards.sh
          env:
            - name: GRAFANA_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-user
            - name: GRAFANA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-password
            - name: TARGET_FOLDER_UID
              value: gpu
            - name: TARGET_FOLDER_TITLE
              value: GPU
            - name: STALE_DASHBOARD_UIDS
              value: gpu-power-thermals vllm-latency-http
            - name: STALE_FOLDER_TITLES
              value: cLLM vLLM
          volumeMounts:
            - name: importer-script
              mountPath: /opt/grafana-import
              readOnly: true
            - name: dashboards
              mountPath: /opt/grafana-dashboards
              readOnly: true
      volumes:
        - name: importer-script
          configMap:
            name: grafana-dashboard-importer
            defaultMode: 0755
        - name: dashboards
          configMap:
            name: grafana-dashboard-sources
        - name: storage
          persistentVolumeClaim:
            claimName: grafana-storage
